services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kids-flashcard-app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NEXT_TELEMETRY_DISABLED=1
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: npm run dev
    stdin_open: true
    tty: true

volumes:
  node_modules:
